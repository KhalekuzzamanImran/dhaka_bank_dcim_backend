services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: dcim
      POSTGRES_USER: dcim
      POSTGRES_PASSWORD: dcim
    ports: ['5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dcim -d dcim']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  mailpit:
    image: axllent/mailpit:latest
    command: ['--webroot', '/mailpit']
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  api:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    env_file: .env
    environment:
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      EMAIL_USE_TLS: 'False'
      EMAIL_USE_SSL: 'False'
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
      DEFAULT_FROM_EMAIL: dcim-alerts@mail.local
    ports: ['8000:8000']
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
      mailpit: {condition: service_started}
    volumes: ['.:/app']

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api: {condition: service_started}
      mailpit: {condition: service_started}
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/app:ro

  scheduler-worker:
    build: .
    command: celery -A config worker -l info -Q scheduler --concurrency=1 --hostname=scheduler@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  snmp-worker-1:
    build: .
    command: celery -A config worker -l info -Q snmp_high,snmp_normal,snmp_low --concurrency=6 --hostname=snmp1@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  snmp-worker-2:
    build: .
    command: celery -A config worker -l info -Q snmp_high,snmp_normal,snmp_low --concurrency=6 --hostname=snmp2@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  modbus-worker-1:
    build: .
    command: celery -A config worker -l info -Q modbus_high,modbus_normal,modbus_low --concurrency=4 --hostname=modbus1@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  modbus-worker-2:
    build: .
    command: celery -A config worker -l info -Q modbus_high,modbus_normal,modbus_low --concurrency=4 --hostname=modbus2@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  trap-receiver:
    build: .
    command: python -m collectors.snmp_trap_receiver.receiver
    ports:
      - '162:1162/udp'
    env_file: .env
    depends_on: [redis]
    volumes: ['.:/app']

  trap-processor-worker:
    build: .
    command: celery -A config worker -l info -Q traps --concurrency=4 --hostname=traps@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  alert-worker:
    build: .
    command: celery -A config worker -l info -Q alerts --concurrency=4 --hostname=alerts@%h
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

  notification-worker:
    build: .
    command: celery -A config worker -l info -Q notifications --concurrency=2 --hostname=notifications@%h
    env_file: .env
    environment:
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      EMAIL_USE_TLS: 'False'
      EMAIL_USE_SSL: 'False'
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
      DEFAULT_FROM_EMAIL: dcim-alerts@mail.local
    depends_on: [api, redis]
    volumes: ['.:/app']

  report-worker:
    build: .
    command: celery -A config worker -l info -Q reports --concurrency=1 --hostname=reports@%h
    env_file: .env
    environment:
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      EMAIL_USE_TLS: 'False'
      EMAIL_USE_SSL: 'False'
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
      DEFAULT_FROM_EMAIL: dcim-alerts@mail.local
    depends_on: [api, redis]
    volumes: ['.:/app']

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    depends_on: [api, redis]
    volumes: ['.:/app']

volumes:
  postgres_data:
  mailpit_data:
